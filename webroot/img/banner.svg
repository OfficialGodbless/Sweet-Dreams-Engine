<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060e"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c6fff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c6fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c6fff"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <circle cx="180" cy="60" r="220" fill="url(#orb1)" filter="url(#blur1)"/>
  <circle cx="1120" cy="280" r="200" fill="url(#orb2)" filter="url(#blur2)"/>

  <!-- subtle grid texture -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
  </g>

  <!-- status badge -->
  <g>
    <rect x="64" y="64" width="172" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
    <circle cx="84" cy="79" r="4" fill="#34d399">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="96" y="83" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#a78bfa">KERNELSU MODULE</text>
  </g>

  <!-- title -->
  <text x="64" y="172" font-family="Arial, sans-serif" font-size="76" font-weight="900" letter-spacing="-2" fill="url(#titleGrad)">Sweet Dreams</text>
  <text x="64" y="172" font-family="Arial, sans-serif" font-size="76" font-weight="900" letter-spacing="-2" fill="none"/>

  <!-- subtitle -->
  <text x="66" y="208" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="rgba(240,240,250,0.55)">Mediatek FPS Unlocker &amp; Thermal Bypass Engine</text>

  <!-- tag pills -->
  <g font-family="Arial, sans-serif" font-size="12" font-weight="700">
    <rect x="64" y="232" width="96" height="28" rx="14" fill="rgba(124,111,255,0.12)" stroke="rgba(124,111,255,0.3)"/>
    <text x="84" y="250" fill="#a78bfa">v1.9.2</text>

    <rect x="172" y="232" width="120" height="28" rx="14" fill="rgba(34,211,238,0.10)" stroke="rgba(34,211,238,0.28)"/>
    <text x="190" y="250" fill="#22d3ee">FPS UNLOCK</text>

    <rect x="304" y="232" width="148" height="28" rx="14" fill="rgba(251,146,60,0.10)" stroke="rgba(251,146,60,0.28)"/>
    <text x="322" y="250" fill="#fb923c">THERMAL BYPASS</text>

    <rect x="464" y="232" width="160" height="28" rx="14" fill="rgba(248,113,113,0.10)" stroke="rgba(248,113,113,0.28)"/>
    <text x="482" y="250" fill="#f87171">RAM / BATTERY MGMT</text>
  </g>

  <!-- right side mark -->
  <g transform="translate(1050,90)">
    <circle cx="70" cy="70" r="68" fill="none" stroke="rgba(124,111,255,0.25)" stroke-width="2"/>
    <circle cx="70" cy="70" r="68" fill="none" stroke="#7c6fff" stroke-width="2" stroke-dasharray="20 380" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 70 70" to="360 70 70" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="70" y="62" font-family="Arial, sans-serif" font-size="36" text-anchor="middle">😴</text>
    <text x="70" y="98" font-family="Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="1" text-anchor="middle" fill="rgba(240,240,250,0.4)">LGTL</text>
  </g>

  <text x="64" y="296" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(240,240,250,0.3)">by Lil G Tech Labs</text>
</svg>
